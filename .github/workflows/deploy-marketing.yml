name: Deploy marketing site

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ap-southeast-1
  S3_BUCKET: omgexp-marketing-site
  PUBLIC_SITE_URL: https://www.omgcargo.tech
  PUBLIC_APP_URL: https://cargo.omgexp.com
  PUBLIC_CONTACT_API_URL: https://cargo.omgexp.com/api/contact
  PUBLIC_CANONICAL_BASE: https://www.omgcargo.tech
  PUBLIC_NOINDEX: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          package-manager-cache: false

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          PUBLIC_SITE_URL: ${{ env.PUBLIC_SITE_URL }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify build output
        run: npm run verify

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
